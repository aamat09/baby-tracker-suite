# Baby Tracker Remote — ESP32-C3 SuperMini + 4x4 button matrix + RGB LED
# Firmware for the 3D-printed physical remote.
#
# 15 buttons on a 4x4 scan matrix (no diodes — single-press logging):
#   Rows (drive):  GPIO21, GPIO20, GPIO3, GPIO4   ← ACTIVE (OLED build, see NOTE)
#   Cols (sense):  GPIO5, GPIO6, GPIO7, GPIO10  (internal pullups)
#   WS2812B LED:   GPIO8
# The 16th position (row 3, col 3) is the LED window — no switch.
#
# NOTE — THIS BUILD targets the OLED unit: ROW0/ROW1 are moved off GPIO0/GPIO1 to
# GPIO21/GPIO20 (C3 UART0 pins, free because the logger runs on USB_SERIAL_JTAG),
# which frees GPIO0 (I2C SDA) + GPIO1 (I2C SCL) for the 0.96" SSD1306 OLED.
# To flash a FABBED PCB (no OLED) instead: set ROW0/ROW1 back to GPIO0/GPIO1 and
# delete the i2c/font/display/wifi_info/wifi_signal blocks below.
#
# Each press publishes MQTT to trigger the n8n baby-event webhook; the RGB
# LED flashes the button's colour as confirmation.

esphome:
  name: baby-remote
  friendly_name: "Baby Remote"
  project:
    name: "smarthomemaestro.baby_remote"
    version: "2026.3.1"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# Wireless firmware updates. After this first USB flash the device is reachable
# over WiFi: `esphome run baby_remote.yaml` will offer the network port (or use
# the ESPHome dashboard). No HA API — the remote stays MQTT/n8n-only.
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: HIGH
  # SuperMini/C3 PCB-antenna overdrive: at full 20dBm the cheap chip antenna
  # distorts and association fails (auth->init loop). Cap TX power. cpapdash-push-c3
  # uses esp_wifi_set_max_tx_power(44)≈11dBm for the same reason; 8.5dB is safe here.
  output_power: 8.5dB

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  discovery: false
  # The OLED is a dumb 3-row display: the n8n backend PUBLISHES the rows
  # (last feed / last pump / reminder) here (retained), the device just renders.
  on_json_message:
    - topic: baby/remote/display
      then:
        - lambda: |-
            if (!x["l1"].isNull()) id(disp_l1) = x["l1"].as<std::string>();
            if (!x["l2"].isNull()) id(disp_l2) = x["l2"].as<std::string>();
            if (!x["l3"].isNull()) id(disp_l3) = x["l3"].as<std::string>();
    # Generic banner channel: pops ANY two-line text on the OLED for ~secs
    # (default 4s), then falls back to the schedule. Publish (non-retained, so
    # it shows once) {"l1":"...","l2":"...","secs":4} — used by the n8n feed
    # reminder and available for any other "say this on the device" message.
    - topic: baby/remote/reminder
      then:
        - lambda: |-
            id(flash_l1) = x["l1"].isNull() ? std::string("") : x["l1"].as<std::string>();
            id(flash_l2) = x["l2"].isNull() ? std::string("") : x["l2"].as<std::string>();
            uint32_t secs = x["secs"].isNull() ? 4 : x["secs"].as<uint32_t>();
            id(flash_until) = millis() + secs * 1000;
        - component.update: oled
  # Retained alert flag — "1"/"on" pulses the LED while a reminder is active.
  on_message:
    topic: baby/remote/alert
    then:
      # On the rising edge (inactive -> active) pop a 4s reminder banner on the
      # OLED; keep tracking the flag for the ambient LED pulse below.
      - lambda: |-
          bool now_active = (x == "1" || x == "on" || x == "true");
          // Skip the banner on the first (retained) message after boot/reconnect;
          // only a genuine 0 -> 1 transition while primed pops the reminder.
          if (id(alert_primed) && now_active && !id(alert_active)) {
            id(flash_l1) = "Pump reminder";
            id(flash_l2) = "pump due now";
            id(flash_until) = millis() + 4000;
            id(buzzer).play("due:d=8,o=6,b=150:c,e,g,p,g");   // one-shot reminder chime
          }
          id(alert_active) = now_active;
          id(alert_primed) = true;
      - component.update: oled

# 3 display rows + reminder flag, pushed over MQTT (above).
globals:
  - id: disp_l1
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: disp_l2
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: disp_l3
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: alert_active
    type: bool
    restore_value: no
    initial_value: 'false'
  # False until the first alert message is seen, so a RETAINED "1" delivered on
  # connect/boot only syncs state instead of popping the reminder banner.
  - id: alert_primed
    type: bool
    restore_value: no
    initial_value: 'false'
  # Transient OLED banner: the last button choice (or a pump reminder). While
  # millis() < flash_until the display shows flash_l1/flash_l2 instead of the
  # schedule, then falls back automatically.
  - id: flash_l1
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: flash_l2
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: flash_until
    type: uint32_t
    restore_value: no
    initial_value: '0'

# While a reminder is active, give a gentle amber LED pulse every few seconds
# (button-press feedback still flashes the button colour independently).
interval:
  - interval: 6s
    then:
      - if:
          condition:
            lambda: 'return id(alert_active);'
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 45%
                blue: 0%
                brightness: 70%
            - delay: 300ms
            - light.turn_off: {id: status_led}

# Passive piezo buzzer on GPIO2 (the only free pin on the OLED build). LEDC PWM
# drives it; RTTTL plays short tunes — a tick on each button press, a chime when a
# reminder fires. Wiring: piezo between GPIO2 and GND (no 5V, no resistor).
output:
  - platform: ledc
    pin: GPIO2
    id: buzzer_out

rtttl:
  id: buzzer
  output: buzzer_out

logger:
  level: WARN
  hardware_uart: USB_SERIAL_JTAG   # log over the C3 native USB (also keeps clear of UART0 if the prototype's 20/21 rows are used)

# RGB LED for button press feedback (WS2812B on GPIO8).
# esp32_rmt_led_strip = the esp-idf-native WS2812 driver (neopixelbus is arduino-only).
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    rgb_order: GRB
    chipset: WS2812
    pin: GPIO8
    num_leds: 1
    name: "Status LED"
    internal: true
    default_transition_length: 0s

# ── 0.96" SSD1306 OLED (I2C) — OLED build only ─────────────────────────────
# Rows 0/1 were moved to GPIO21/20 so GPIO0/1 are free for I2C. Wiring (4-pin
# module): GND→GND, VDD→3V3, SCK→GPIO1 (SCL), SDA→GPIO0. Address 0x3C.
# Bring-up screen: name + IP + RSSI (confirms wiring + WiFi).
i2c:
  sda: GPIO0
  scl: GPIO1
  scan: true
  frequency: 400kHz

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 16
  - file: "gfonts://Roboto"
    id: font_body
    size: 11

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip

sensor:
  - platform: wifi_signal
    id: wifi_rssi
    update_interval: 5s

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    update_interval: 1s   # so a flash banner auto-restores to the schedule
    lambda: |-
      // Transient banner: last button choice / pump reminder for ~4s, then the
      // normal schedule. component.update on press makes it appear instantly.
      if (millis() < id(flash_until)) {
        it.printf(64, 14, id(font_title), TextAlign::TOP_CENTER, "%s", id(flash_l1).c_str());
        it.printf(64, 40, id(font_body), TextAlign::TOP_CENTER, "%s", id(flash_l2).c_str());
        return;
      }
      // Title (a '!' marker when a reminder is active)
      it.printf(0, 0, id(font_title), id(alert_active) ? "Baby Remote  !" : "Baby Remote");
      if (id(disp_l1).empty() && id(disp_l2).empty() && id(disp_l3).empty()) {
        // No data pushed yet -> show connectivity as a fallback
        it.printf(0, 20, id(font_body), "IP %s", id(wifi_ip).state.c_str());
        it.printf(0, 36, id(font_body), "RSSI %.0f dBm", id(wifi_rssi).state);
      } else {
        it.printf(0, 18, id(font_body), "%s", id(disp_l1).c_str());
        it.printf(0, 34, id(font_body), "%s", id(disp_l2).c_str());
        it.printf(0, 50, id(font_body), "%s", id(disp_l3).c_str());
      }

# 4x4 scan matrix — 8 GPIOs for up to 16 keys (no diodes, no pulldowns →
# rows driven, columns read via internal pullups).
matrix_keypad:
  id: keypad
  rows:
    - pin: GPIO21   # ROW0 — OLED build: moved off GPIO0 (now I2C SDA). Fabbed PCB = GPIO0
    - pin: GPIO20   # ROW1 — OLED build: moved off GPIO1 (now I2C SCL). Fabbed PCB = GPIO1
    - pin: GPIO3    # ROW2
    - pin: GPIO4    # ROW3
  columns:
    - pin: GPIO5
    - pin: GPIO6
    - pin: GPIO7
    - pin: GPIO10
  has_diodes: false
  has_pulldowns: false

# Helper script to flash the LED and publish the event
script:
  - id: log_event
    parameters:
      label: string
      event_type: string
      event_subtype: string
      r: int
      g: int
      b: int
    then:
      - rtttl.play: "chirp:d=32,o=7,b=240:c"   # short tick on every press
      # Show the user's choice on the OLED for ~4s, then it falls back to the schedule.
      - lambda: |-
          id(flash_l1) = label;
          id(flash_l2) = "logged";
          id(flash_until) = millis() + 4000;
      - component.update: oled
      - light.turn_on:
          id: status_led
          red: !lambda "return r / 255.0;"
          green: !lambda "return g / 255.0;"
          blue: !lambda "return b / 255.0;"
          brightness: 100%
      - mqtt.publish:
          topic: "baby/remote/event"
          payload: !lambda |-
            return "{\"event_type\":\"" + event_type + "\",\"event_subtype\":\"" + event_subtype + "\"}";
      - delay: 500ms
      - light.turn_off:
          id: status_led

# One binary_sensor per matrix position (row, col). Layout matches the
# 3D-printed panel; position (3,3) is the LED window and is intentionally unused.
binary_sensor:
  # ── Row 0: Feed ──
  - platform: matrix_keypad
    keypad_id: keypad
    row: 0
    col: 0
    name: "Breast"
    on_press:
      - script.execute: {id: log_event, label: "Breast", event_type: "feed", event_subtype: "breast", r: 255, g: 105, b: 180}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 0
    col: 1
    name: "Bottle"
    on_press:
      - script.execute: {id: log_event, label: "Bottle", event_type: "feed", event_subtype: "bottle", r: 74, g: 144, b: 217}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 0
    col: 2
    name: "Solid"
    on_press:
      - script.execute: {id: log_event, label: "Solid", event_type: "feed", event_subtype: "solid", r: 45, g: 106, b: 79}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 0
    col: 3
    name: "Sleep"
    # Single tap = sleep START; double tap (two taps <1s apart) = sleep END.
    # on_multi_click resolves the gesture, so the device sends an explicit
    # start/end subtype (no more "toggle" — the backend stores it verbatim).
    on_multi_click:
      # Double-click pattern is matched first (more specific) -> sleep end.
      - timing:
          - ON for at most 0.6s
          - OFF for at most 0.6s
          - ON for at most 0.6s
          - OFF for at least 0.1s
        then:
          - script.execute: {id: log_event, label: "Sleep end", event_type: "sleep", event_subtype: "end", r: 80, g: 70, b: 160}
      # Single click -> sleep start (fires after ~0.6s of no second tap).
      - timing:
          - ON for at most 0.6s
          - OFF for at least 0.6s
        then:
          - script.execute: {id: log_event, label: "Sleep start", event_type: "sleep", event_subtype: "start", r: 123, g: 104, b: 238}

  # ── Row 1: Pump + Other ──
  - platform: matrix_keypad
    keypad_id: keypad
    row: 1
    col: 0
    name: "Pump L"
    on_press:
      - script.execute: {id: log_event, label: "Pump L", event_type: "pump", event_subtype: "left", r: 177, g: 156, b: 217}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 1
    col: 1
    name: "Pump R"
    on_press:
      - script.execute: {id: log_event, label: "Pump R", event_type: "pump", event_subtype: "right", r: 177, g: 156, b: 217}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 1
    col: 2
    name: "Bath"
    on_press:
      - script.execute: {id: log_event, label: "Bath", event_type: "bath", event_subtype: "", r: 0, g: 206, b: 209}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 1
    col: 3
    name: "Medicine"
    on_press:
      - script.execute: {id: log_event, label: "Medicine", event_type: "medicine", event_subtype: "", r: 220, g: 53, b: 69}

  # ── Row 2: Diapers ──
  - platform: matrix_keypad
    keypad_id: keypad
    row: 2
    col: 0
    name: "Pee"
    on_press:
      - script.execute: {id: log_event, label: "Pee", event_type: "diaper", event_subtype: "pee", r: 255, g: 215, b: 0}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 2
    col: 1
    name: "Poop"
    on_press:
      - script.execute: {id: log_event, label: "Poop", event_type: "diaper", event_subtype: "poop", r: 210, g: 180, b: 140}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 2
    col: 2
    name: "Both"
    on_press:
      - script.execute: {id: log_event, label: "Both", event_type: "diaper", event_subtype: "both", r: 139, g: 105, b: 20}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 2
    col: 3
    name: "Change"
    on_press:
      - script.execute: {id: log_event, label: "Change", event_type: "diaper", event_subtype: "change", r: 189, g: 183, b: 107}

  # ── Row 3: Other (col 3 = LED window, no switch) ──
  - platform: matrix_keypad
    keypad_id: keypad
    row: 3
    col: 0
    name: "Tummy Time"
    on_press:
      - script.execute: {id: log_event, label: "Tummy Time", event_type: "tummy_time", event_subtype: "", r: 0, g: 128, b: 128}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 3
    col: 1
    name: "Weight"
    on_press:
      - script.execute: {id: log_event, label: "Weight", event_type: "weight", event_subtype: "", r: 128, g: 128, b: 128}

  - platform: matrix_keypad
    keypad_id: keypad
    row: 3
    col: 2
    name: "Note"
    on_press:
      - script.execute: {id: log_event, label: "Note", event_type: "note", event_subtype: "remote", r: 245, g: 245, b: 245}
